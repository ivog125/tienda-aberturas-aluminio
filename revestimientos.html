<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revestimientos PVC — Omar Aberturas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header-mount"></div>

<div class="page-banner">
  <div class="page-banner-pattern"></div>
  <div class="page-banner-inner">
    <div class="page-breadcrumb"><a href="index.html">Inicio</a><span>›</span> Revestimientos PVC</div>
    <h1 class="page-title">🏠 Revestimientos PVC</h1>
    <p class="page-subtitle">Cielorrasos, paredes y zócalos · Resistentes a la humedad · Fácil instalación</p>
  </div>
</div>

<section class="productos-section">
  <div class="productos-wrapper">
    <div class="tabs-row">
      <button class="tab-btn active" onclick="switchTab('catalogo')">🏠 Catálogo</button>
      <button class="tab-btn" onclick="switchTab('medida')">📋 Consulta especial</button>
    </div>

    <div class="tab-panel active" id="tab-catalogo">
      <div class="productos-grid" id="grid-catalogo"></div>
    </div>

    <div class="tab-panel" id="tab-medida">
      <p style="font-size:13px;color:var(--gris-texto);margin-bottom:1.5rem;max-width:600px;font-weight:600;">
        ¿Necesitás cantidad especial, color específico o asesoramiento? Completá el formulario y te contactamos.
      </p>
      <div class="medida-grid">
        <div class="medida-card">
          <div class="medida-card-header">
            <div class="medida-icono">🏠</div>
            <div><div class="medida-titulo">Consulta de revestimiento</div><div class="medida-tag">Asesoramiento personalizado</div></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Tipo</label>
              <select id="r-tipo"><option value="">Seleccionar...</option><option>Cielorraso</option><option>Revestimiento de pared</option><option>Zócalo</option><option>Combinado</option></select>
            </div>
            <div class="form-field"><label>Superficie (m²)</label>
              <input type="number" id="r-sup" placeholder="Ej: 30">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Color / terminación</label>
              <select id="r-color"><option value="">Seleccionar...</option><option>Blanco liso</option><option>Blanco texturado</option><option>Madera</option><option>Mármol</option><option>Otro</option></select>
            </div>
            <div class="form-field"><label>Cantidad (cajas)</label>
              <input type="number" id="r-cant" value="1" min="1">
            </div>
          </div>
          <div class="form-field full" style="margin-top:4px;"><label>Observaciones</label><textarea id="r-obs" placeholder="Medidas del ambiente, tipo de instalación, etc."></textarea></div>
          <button class="btn-consultar" onclick="submitRevestimiento()">📲 Enviar consulta por WhatsApp</button>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-mount"></div>
<div id="cart-mount"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="partials.js"></script>
<script src="shared.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderNav('revestimientos.html');
document.getElementById('footer-mount').innerHTML = renderFooter();
document.getElementById('cart-mount').innerHTML = renderCartSidebar();

const CAT_ICONO = { Ventanas:'🪟', Puertas:'🚪', Portones:'🏗️', Revestimientos:'🏠', Complementos:'🔧' };

function parsePrecioNum(texto) {
  if (!texto) return 0;
  const m = texto.replace(/\./g, '').match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

function cargarProductosPagina(categorias) {
  const todos = JSON.parse(localStorage.getItem('admin_productos') || 'null') || [];
  return todos.filter(p => p.visible && categorias.includes(p.categoria));
}

const qtyMap = {};

function renderCatalogo(lista) {
  const grid = document.getElementById('grid-catalogo');
  if (!lista.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gris-texto);">
      <div style="font-size:36px;margin-bottom:1rem;">🏠</div>
      <div style="font-weight:700;margin-bottom:.5rem;">Catálogo en construcción</div>
      <div style="font-size:13px;">El catálogo se carga desde el panel de administración.</div>
    </div>`;
    return;
  }
  grid.innerHTML = lista.map(p => {
    if (!qtyMap[p.id]) qtyMap[p.id] = 1;
    const icono = CAT_ICONO[p.categoria] || '📦';
    const precioNum = parsePrecioNum(p.precio);
    const precioDisplay = precioNum > 0
      ? `$${precioNum.toLocaleString('es-AR')}<span class="unidad"> / ${p.unidad||'unidad'}</span>`
      : `<span style="color:var(--gris-texto)">${p.precio || 'A confirmar'}</span>`;
    const acciones = precioNum > 0
      ? `<div class="qty-control">
           <button class="qty-btn" onclick="cambiarQty(${p.id},-1)">−</button>
           <span class="qty-num" id="qty-${p.id}">${qtyMap[p.id]}</span>
           <button class="qty-btn" onclick="cambiarQty(${p.id},1)">+</button>
         </div>
         <button class="btn-agregar" id="btn-${p.id}" onclick="addToCart(${p.id})">+ Agregar</button>`
      : `<button class="btn-agregar" style="background:var(--gris-texto)" onclick="consultarWA('${p.nombre.replace(/'/g,"\\'")}')">Consultar →</button>`;
    return `
      <div class="producto-card">
        <div class="producto-img">${icono}</div>
        <div class="producto-body">
          <div class="producto-nombre">${p.nombre}</div>
          <div class="producto-desc">${p.descripcion || ''}</div>
          <div class="producto-precio">${precioDisplay}</div>
          <div class="producto-actions">${acciones}</div>
        </div>
      </div>`;
  }).join('');
}

function cambiarQty(id, d) {
  qtyMap[id] = Math.max(1, (qtyMap[id]||1) + d);
  const el = document.getElementById('qty-' + id);
  if (el) el.textContent = qtyMap[id];
}

function addToCart(id) {
  const p = PRODUCTOS_PAGINA.find(x => x.id === id);
  if (!p) return;
  const precioNum = parsePrecioNum(p.precio);
  agregarFijo({ id: p.id, icono: CAT_ICONO[p.categoria]||'📦', nombre: p.nombre, precio: precioNum, unidad: p.unidad||'unidad', qty: qtyMap[id]||1 });
  showToast('✓ ' + p.nombre + ' agregado');
  const btn = document.getElementById('btn-' + id);
  if (btn) { btn.textContent='✓ Agregado'; btn.classList.add('agregado'); setTimeout(()=>{ btn.textContent='+ Agregar'; btn.classList.remove('agregado'); }, 1500); }
}

function consultarWA(nombre) {
  const msg = `Hola! Me gustaría consultar precio y disponibilidad de: ${nombre}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function submitRevestimiento(){
  const t=document.getElementById('r-tipo').value,s=document.getElementById('r-sup').value;
  const c=document.getElementById('r-color').value,o=document.getElementById('r-obs').value;
  const qty=parseInt(document.getElementById('r-cant').value)||1;
  if(!t){showToast('⚠ Seleccioná el tipo de revestimiento');return;}
  let msg=`🏠 *Consulta revestimiento PVC — Omar Aberturas*\n\n`;
  msg+=`Tipo: ${t}\n`;
  if(s) msg+=`Superficie: ${s} m²\n`;
  if(c) msg+=`Color / terminación: ${c}\n`;
  msg+=`Cantidad: ${qty} caja${qty>1?'s':''}\n`;
  if(o) msg+=`Observaciones: ${o}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('✓ Consulta enviada por WhatsApp');
  ['r-tipo','r-sup','r-color','r-obs'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('r-cant').value=1;
}

const PRODUCTOS_PAGINA = cargarProductosPagina(['Revestimientos']);
renderCatalogo(PRODUCTOS_PAGINA);
switchTab('catalogo');
</script>
</body>
</html>
