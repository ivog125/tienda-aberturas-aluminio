<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puertas y Portones — Omar Aberturas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.subcat-intro { background: var(--primario-suave); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }
.subcat-intro-icon { font-size: 28px; flex-shrink: 0; }
.subcat-intro-title { font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 900; color: var(--primario); }
.subcat-intro-desc { font-size: 13px; color: var(--gris-texto); margin-top: 2px; }
</style>
</head>
<body>
<div id="header-mount"></div>

<div class="page-banner">
  <div class="page-banner-pattern"></div>
  <div class="page-banner-inner">
    <div class="page-breadcrumb"><a href="index.html">Inicio</a><span>›</span> Puertas y Portones</div>
    <h1 class="page-title">🚪 Puertas y Portones</h1>
    <p class="page-subtitle">Distribución de marcas líderes · Chapa y aluminio · Puertas y portones</p>
  </div>
</div>

<section class="productos-section">
  <div class="productos-wrapper">
    <div class="tabs-row">
      <button class="tab-btn active" onclick="switchTab('catalogo')">🚪 Catálogo</button>
      <button class="tab-btn" onclick="switchTab('medida')">📐 A medida (consulta)</button>
    </div>

    <!-- ── CATÁLOGO DINÁMICO ── -->
    <div class="tab-panel active" id="tab-catalogo">
      <div class="productos-grid" id="grid-catalogo"></div>
    </div>

    <!-- ── A MEDIDA ── -->
    <div class="tab-panel" id="tab-medida">
      <p style="font-size:13px;color:var(--gris-texto);margin-bottom:1.5rem;max-width:600px;font-weight:600;">
        Completá las especificaciones. Te enviamos el presupuesto a la brevedad.
      </p>
      <div class="medida-grid">
        <div class="medida-card">
          <div class="medida-card-header">
            <div class="medida-icono">🏗️</div>
            <div><div class="medida-titulo">Portón a medida</div><div class="medida-tag">Precio a confirmar</div></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Ancho (cm)</label><input type="number" id="pt-ancho" placeholder="Ej: 300"></div>
            <div class="form-field"><label>Alto (cm)</label><input type="number" id="pt-alto" placeholder="Ej: 200"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Material</label>
              <select id="pt-mat"><option value="">Seleccionar...</option><option>Chapa</option><option>Aluminio</option><option>Mixto</option></select>
            </div>
            <div class="form-field"><label>Apertura</label>
              <select id="pt-apertura"><option value="">Seleccionar...</option><option>Batiente 1 hoja</option><option>Batiente 2 hojas</option><option>Corredizo</option><option>Seccional</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Motorización</label>
              <select id="pt-motor"><option>No</option><option>Sí, incluir</option><option>Consultar aparte</option></select>
            </div>
            <div class="form-field"><label>Cantidad</label><input type="number" id="pt-cant" value="1" min="1"></div>
          </div>
          <div class="form-field full" style="margin-top:4px;"><label>Observaciones</label><textarea id="pt-obs" placeholder="Detalles adicionales..."></textarea></div>
          <button class="btn-consultar" onclick="submitPorton()">📲 Enviar consulta por WhatsApp</button>
        </div>

        <div class="medida-card">
          <div class="medida-card-header">
            <div class="medida-icono">🚪</div>
            <div><div class="medida-titulo">Puerta a medida</div><div class="medida-tag">Precio a confirmar</div></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Ancho (cm)</label><input type="number" id="ch-ancho" placeholder="Ej: 90"></div>
            <div class="form-field"><label>Alto (cm)</label><input type="number" id="ch-alto" placeholder="Ej: 210"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Material</label>
              <select id="ch-mat"><option value="">Seleccionar...</option><option>Chapa</option><option>Aluminio</option></select>
            </div>
            <div class="form-field"><label>Tipo</label>
              <select id="ch-tipo"><option value="">Seleccionar...</option><option>Lisa</option><option>Plegada</option><option>Con ventiluz</option><option>Abatible</option><option>Corrediza</option></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Uso</label>
              <select id="ch-uso"><option value="">Seleccionar...</option><option>Exterior</option><option>Interior</option></select>
            </div>
            <div class="form-field"><label>Cantidad</label><input type="number" id="ch-cant" value="1" min="1"></div>
          </div>
          <div class="form-field full" style="margin-top:4px;"><label>Observaciones</label><textarea id="ch-obs" placeholder="Detalles adicionales..."></textarea></div>
          <button class="btn-consultar" onclick="submitPuerta()">📲 Enviar consulta por WhatsApp</button>
        </div>
      </div>
    </div>

  </div>
</section>

<div id="footer-mount"></div>
<div id="cart-mount"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="partials.js"></script>
<script src="shared.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderNav('puertas.html');
document.getElementById('footer-mount').innerHTML = renderFooter();
document.getElementById('cart-mount').innerHTML = renderCartSidebar();

/* ── PRODUCTOS DINÁMICOS ── */
const CAT_ICONO = { Ventanas:'🪟', Puertas:'🚪', Portones:'🏗️', Revestimientos:'🏠', Complementos:'🔧' };

function parsePrecioNum(texto) {
  if (!texto) return 0;
  const m = texto.replace(/\./g, '').match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

function cargarProductosPagina(categorias) {
  const todos = JSON.parse(localStorage.getItem('admin_productos') || 'null') || [];
  return todos.filter(p => p.visible && categorias.includes(p.categoria));
}

const qtyMap = {};

function renderCatalogo(lista) {
  const grid = document.getElementById('grid-catalogo');
  if (!lista.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gris-texto);">
      <div style="font-size:36px;margin-bottom:1rem;">🚪</div>
      <div style="font-weight:700;margin-bottom:.5rem;">Catálogo en construcción</div>
      <div style="font-size:13px;">El catálogo se carga desde el panel de administración.</div>
    </div>`;
    return;
  }
  grid.innerHTML = lista.map(p => {
    if (!qtyMap[p.id]) qtyMap[p.id] = 1;
    const icono = CAT_ICONO[p.categoria] || '📦';
    const precioNum = parsePrecioNum(p.precio);
    const precioDisplay = precioNum > 0
      ? `$${precioNum.toLocaleString('es-AR')}<span class="unidad"> / ${p.unidad||'unidad'}</span>`
      : `<span style="color:var(--gris-texto)">${p.precio || 'A confirmar'}</span>`;
    const acciones = precioNum > 0
      ? `<div class="qty-control">
           <button class="qty-btn" onclick="cambiarQty(${p.id},-1)">−</button>
           <span class="qty-num" id="qty-${p.id}">${qtyMap[p.id]}</span>
           <button class="qty-btn" onclick="cambiarQty(${p.id},1)">+</button>
         </div>
         <button class="btn-agregar" id="btn-${p.id}" onclick="addToCart(${p.id})">+ Agregar</button>`
      : `<button class="btn-agregar" style="background:var(--gris-texto)" onclick="consultarWA('${p.nombre.replace(/'/g,"\\'")}')">Consultar →</button>`;
    return `
      <div class="producto-card">
        <div class="producto-img">${icono}</div>
        <div class="producto-body">
          <div class="producto-nombre">${p.nombre}</div>
          <div class="producto-desc">${p.descripcion || ''}</div>
          <div class="producto-precio">${precioDisplay}</div>
          <div class="producto-actions">${acciones}</div>
        </div>
      </div>`;
  }).join('');
}

function cambiarQty(id, d) {
  qtyMap[id] = Math.max(1, (qtyMap[id]||1) + d);
  const el = document.getElementById('qty-' + id);
  if (el) el.textContent = qtyMap[id];
}

function addToCart(id) {
  const p = PRODUCTOS_PAGINA.find(x => x.id === id);
  if (!p) return;
  const precioNum = parsePrecioNum(p.precio);
  agregarFijo({ id: p.id, icono: CAT_ICONO[p.categoria]||'📦', nombre: p.nombre, precio: precioNum, unidad: p.unidad||'unidad', qty: qtyMap[id]||1 });
  showToast('✓ ' + p.nombre + ' agregado');
  const btn = document.getElementById('btn-' + id);
  if (btn) { btn.textContent='✓ Agregado'; btn.classList.add('agregado'); setTimeout(()=>{ btn.textContent='+ Agregar'; btn.classList.remove('agregado'); }, 1500); }
}

function consultarWA(nombre) {
  const msg = `Hola! Me gustaría consultar precio y disponibilidad de: ${nombre}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

/* ── A MEDIDA ── */
function submitPorton() {
  const a=document.getElementById('pt-ancho').value, al=document.getElementById('pt-alto').value, m=document.getElementById('pt-mat').value;
  const ap=document.getElementById('pt-apertura').value, mo=document.getElementById('pt-motor').value, o=document.getElementById('pt-obs').value;
  const qty=parseInt(document.getElementById('pt-cant').value)||1;
  if(!a||!al||!m){ showToast('⚠ Completá ancho, alto y material'); return; }
  let msg=`🏗️ *Consulta portón a medida — Omar Aberturas*\n\n`;
  msg+=`📐 Medidas: ${a}×${al} cm\nCantidad: ${qty}\nMaterial: ${m}\n`;
  if(ap) msg+=`Apertura: ${ap}\n`;
  msg+=`Motor: ${mo}\n`;
  if(o) msg+=`Observaciones: ${o}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('✓ Consulta enviada por WhatsApp');
  ['pt-ancho','pt-alto','pt-mat','pt-apertura','pt-obs'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('pt-cant').value=1; document.getElementById('pt-motor').value='No';
}

function submitPuerta() {
  const a=document.getElementById('ch-ancho').value, al=document.getElementById('ch-alto').value;
  const m=document.getElementById('ch-mat').value, t=document.getElementById('ch-tipo').value;
  const uso=document.getElementById('ch-uso').value, o=document.getElementById('ch-obs').value;
  const qty=parseInt(document.getElementById('ch-cant').value)||1;
  if(!a||!al||!t){ showToast('⚠ Completá ancho, alto y tipo'); return; }
  let msg=`🚪 *Consulta puerta a medida — Omar Aberturas*\n\n`;
  msg+=`📐 Medidas: ${a}×${al} cm\nCantidad: ${qty}\n`;
  if(m) msg+=`Material: ${m}\n`;
  msg+=`Tipo: ${t}\n`;
  if(uso) msg+=`Uso: ${uso}\n`;
  if(o) msg+=`Observaciones: ${o}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('✓ Consulta enviada por WhatsApp');
  ['ch-ancho','ch-alto','ch-mat','ch-tipo','ch-uso','ch-obs'].forEach(id=>{ const e=document.getElementById(id); if(e) e.value=''; });
  document.getElementById('ch-cant').value=1;
}

/* ── INIT ── */
const PRODUCTOS_PAGINA = cargarProductosPagina(['Puertas', 'Portones']);
renderCatalogo(PRODUCTOS_PAGINA);
const _tabP = ['catalogo','medida'].includes(location.hash.slice(1)) ? location.hash.slice(1) : 'catalogo';
switchTab(_tabP);
</script>
</body>
</html>
